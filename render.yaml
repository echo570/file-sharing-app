services:
  - type: web
    name: file-sharing-app
    env: node
    plan: free
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    healthCheckPath: /api/health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false